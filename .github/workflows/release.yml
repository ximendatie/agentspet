name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifacts
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build zip
        run: script/build_release_zip.sh

      - name: Build dmg
        run: script/build_release_dmg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mahjong-release-artifacts
          path: .build/dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/dist/*
          body_path: CHANGELOG.md
